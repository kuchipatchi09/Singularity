<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QPI | INTEGRAL SOLVER</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        :root { --bg: #000000; --text: #FFFFFF; --border: #FFFFFF; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background-color: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        .container { display: grid; grid-template-columns: 1.5fr 1fr; height: 100%; }

        /* 좌측: 전개 과정 출력 */
        .solution-view {
            padding: 40px; border-right: 1px solid var(--border);
            overflow-y: auto; display: flex; flex-direction: column; gap: 20px;
        }
        .solution-view h2 { font-size: 1rem; font-weight: 900; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 20px; }
        .step-box { line-height: 1.8; font-size: 1.1rem; }

        /* 우측: 입력 칸 */
        .input-view { padding: 40px; display: flex; flex-direction: column; justify-content: center; gap: 20px; }
        .input-view h1 { font-size: 2rem; font-weight: 900; letter-spacing: -2px; margin-bottom: 10px; }
        #formula-input {
            background: transparent; border: 1px solid var(--border); padding: 20px;
            color: white; font-size: 1.2rem; outline: none; width: 100%;
        }
        .calc-btn {
            background: #FFFFFF; color: #000000; border: none; padding: 15px;
            font-weight: 900; cursor: pointer; transition: 0.2s; font-size: 1rem;
        }
        .calc-btn:hover { background: #CCCCCC; }

        #loading { display: none; font-size: 0.9rem; letter-spacing: 2px; text-align: center; }

        /* 스크롤바 디자인 */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--border); }
    </style>
</head>
<body>

<div class="container">
    <div class="solution-view" id="solution-view">
        <h2>SOLVING PROCESS</h2>
        <div id="loading">CALCULATING...</div>
        <div id="output" class="step-box">적분할 수식을 입력하고 SOLVE 버튼을 누르세요.</div>
    </div>

    <div class="input-view">
        <h1>QPI<br>INTEGRAL</h1>
        <p style="font-size: 0.8rem; color: #888;">입력 예시: integral of x^2 sin(x) dx</p>
        <input type="text" id="formula-input" placeholder="∫ f(x) dx" onkeypress="if(event.keyCode==13) solveIntegral()">
        <button class="calc-btn" onclick="solveIntegral()">SOLVE</button>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyBSTtIf7QDIbVzKPWReLmvG8xn6DDoOIx4"; // 기장님 API 키

    async function solveIntegral() {
        const formula = document.getElementById('formula-input').value;
        const output = document.getElementById('output');
        const loading = document.getElementById('loading');

        if (!formula) return;

        output.innerHTML = "";
        loading.style.display = "block";

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [{
                            text: `당신은 최고의 수학자입니다. 다음 적분 문제의 전개 과정을 아주 상세하게 단계별로 설명해주세요. 
                            반드시 한국어로 설명하되, 수식은 LaTeX 형식으로 써주세요. 
                            결과만 보여주지 말고 중간 과정을 논리적으로 보여주세요. 
                            문제: ${formula}`
                        }]
                    }]
                })
            });

            const data = await response.json();
            const resultText = data.candidates[0].content.parts[0].text;
            
            // 마크다운 형식의 텍스트를 줄바꿈 및 수식 처리
            loading.style.display = "none";
            renderResponse(resultText);

        } catch (error) {
            loading.style.display = "none";
            output.innerText = "오류가 발생했습니다. API 키 또는 네트워크를 확인하세요.";
        }
    }

    function renderResponse(text) {
        const output = document.getElementById('output');
        // 간단한 마크다운 수식 변환 (실제 서비스 시에는 더 정교한 파서 사용 권장)
        const formatted = text
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\n/g, '<br>');
        
        output.innerHTML = formatted;
        
        // LaTeX 렌더링 (KaTeX 자동 적용은 추가 라이브러리가 필요할 수 있으나 기본 텍스트는 출력됨)
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QPI | CALCULUS v3</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <style>
        :root { --bg: #000000; --text: #FFFFFF; --border: #FFFFFF; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background-color: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        .container { display: grid; grid-template-columns: 1.3fr 0.7fr; height: 100%; }

        /* 좌측: 결과창 */
        .solution-view {
            padding: 60px; border-right: 1px solid var(--border);
            overflow-y: auto; background: #000;
        }
        .solution-view h2 { font-size: 0.8rem; font-weight: 900; letter-spacing: 5px; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 40px; color: #888; }
        
        #output { min-height: 200px; }
        .step-label { font-size: 0.9rem; font-weight: 800; border: 1px solid #fff; display: inline-block; padding: 3px 10px; margin-top: 30px; margin-bottom: 10px; }
        .katex-display { margin: 20px 0 !important; text-align: left !important; }
        .katex { font-size: 1.2rem !important; }

        /* 우측: 입력창 */
        .input-view { padding: 60px; display: flex; flex-direction: column; justify-content: center; gap: 30px; }
        .logo { font-size: 3rem; font-weight: 900; letter-spacing: -4px; line-height: 0.8; margin-bottom: 10px; }
        
        .input-group { position: relative; border-bottom: 2px solid #fff; padding: 15px 0; display: flex; align-items: center; }
        .integral-symbol { font-size: 3rem; margin-right: 15px; font-weight: 200; }
        #formula-input {
            background: transparent; border: none;
            color: white; font-size: 2rem; outline: none; width: 100%;
            font-weight: 200;
        }
        .dx-symbol { font-size: 1.8rem; font-weight: 500; margin-left: 10px; }

        .calc-btn {
            background: #FFFFFF; color: #000000; border: none; padding: 20px;
            font-weight: 900; cursor: pointer; font-size: 1.1rem; letter-spacing: 2px;
            transition: 0.2s;
        }
        .calc-btn:hover { background: #888; color: #fff; }
        
        #loading { display: none; margin-top: 15px; font-size: 0.7rem; letter-spacing: 5px; color: #555; text-align: center; }

        ::-webkit-scrollbar { width: 2px; }
        ::-webkit-scrollbar-thumb { background: #fff; }
    </style>
</head>
<body>

<div class="container">
    <div class="solution-view">
        <h2>LOGIC_EXPANSION</h2>
        <div id="output">
            <p style="color:#444;">WAITING_FOR_INPUT...</p>
        </div>
        <div id="loading">EXECUTING_GEMINI_3_FLASH...</div>
    </div>

    <div class="input-view">
        <div class="logo">QPI<br>INTEGRAL</div>
        
        <div class="input-group">
            <span class="integral-symbol">∫</span>
            <input type="text" id="formula-input" placeholder="f(x)" autocomplete="off" onkeypress="if(event.keyCode==13) solve()">
            <span class="dx-symbol">dx</span>
        </div>
        
        <button class="calc-btn" onclick="solve()">SOLVE</button>
        <div id="loading">PROCESSING...</div>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyBSTtIf7QDIbVzKPWReLmvG8xn6DDoOIx4";
    const MODEL_NAME = "gemini-3-flash-preview"; 

    async function solve() {
        const input = document.getElementById('formula-input').value;
        const output = document.getElementById('output');
        const loading = document.querySelectorAll('#loading');

        if (!input) return;

        output.innerHTML = "";
        loading.forEach(l => l.style.display = "block");

        // 프롬프트: 텍스트 서술을 금지하고 수식 구조만 요청
        const prompt = `너는 수학적 증명 엔진이야. 함수 f(x) = ${input} 의 부정적분을 계산해.
        [규칙]
        1. 자연어 설명은 최소화하고 오직 수식 전개 과정만 보여줄 것.
        2. 단계별로 'STEP 1', 'STEP 2' 라벨을 사용할 것.
        3. 모든 수식은 $$ 기호로 감싸서 LaTeX로 작성할 것.
        4. 최종 결과는 \mathbf{}를 사용하여 강조할 것.
        5. 한국어로 답변하되 수식 위주로 작성할 것.`;

        try {
            // gemini-3-flash-preview 모델을 위한 v1beta 경로
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }]
                })
            });

            const data = await response.json();

            if (data.error) {
                output.innerHTML = `<div style="color:red; font-family:monospace;">[ERROR] ${data.error.message}</div>`;
            } else {
                const resultText = data.candidates[0].content.parts[0].text;
                renderMath(resultText);
            }
        } catch (error) {
            output.innerHTML = "SYSTEM_CONNECTION_FAILED";
        } finally {
            loading.forEach(l => l.style.display = "none");
        }
    }

    function renderMath(text) {
        const output = document.getElementById('output');
        
        // STEP 라벨을 디자인 요소로 치환하고 수식 렌더링 준비
        let processedText = text.replace(/STEP (\d+)/g, '<div class="step-label">STEP $1</div>');
        
        output.innerHTML = processedText;

        // KaTeX를 사용하여 페이지 내의 모든 LaTeX 수식 변환
        renderMathInElement(output, {
            delimiters: [
                {left: "$$", right: "$$", display: true},
                {left: "$", right: "$", display: false}
            ],
            throwOnError : false
        });
    }
</script>

</body>
</html>
